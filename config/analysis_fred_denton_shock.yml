root: ..
report: data/processed/analysis_fred_denton_shock_report.json

steps:
  - id: download_hf_fred
    action: download-hf-fred
    out: data/raw/fred_hf_sources.csv

  - id: build_hf_indicators
    action: build-fred-indicators
    raw: data/raw/fred_hf_sources.csv
    out: data/processed/fred_monthly_indicators.csv
    metadata: data/processed/fred_monthly_indicator_metadata.csv

  - id: download_dts_fiscaldata
    action: download-dts-fiscaldata
    out_dir: data/raw/fiscaldata
    start_date: "2005-01-01"
    page_size: 10000

  - id: build_dts_fiscal_indicators
    action: build-dts-fiscal-indicators
    operating_cash_balance: data/raw/fiscaldata/dts_operating_cash_balance.csv
    fed_remit: data/raw/fiscaldata/dts_federal_reserve_earnings.csv
    out: data/processed/dts_fiscal_monthly_indicators.csv
    metadata: data/processed/dts_fiscal_monthly_indicator_metadata.csv

  - id: build_dts_transaction_indicators
    action: build-dts-transaction-indicators
    transactions: data/raw/fiscaldata/dts_deposits_withdrawals_operating_cash.csv
    out: data/processed/dts_transaction_monthly_indicators.csv
    metadata: data/processed/dts_transaction_monthly_indicator_metadata.csv

  - id: merge_fred_dts_indicators
    action: merge-indicators
    inputs:
      - data/processed/fred_monthly_indicators.csv
      - data/processed/dts_fiscal_monthly_indicators.csv
      - data/processed/dts_transaction_monthly_indicators.csv
    out: data/processed/fred_dts_monthly_indicators.csv

  - id: build_proxy
    action: build-proxy
    monthly_indicators: data/processed/fred_dts_monthly_indicators.csv
    benchmark_method: denton
    method_label: indicator_denton_headline
    out_dir: data/processed/fred_denton_proxy

  - id: build_envelope
    action: build-envelope
    monthly_indicators: data/processed/fred_dts_monthly_indicators.csv
    out_dir: data/processed/fred_envelope

  - id: summarize_proxy
    action: summarize-run
    run_dir: data/processed/fred_denton_proxy
    out_json: data/processed/fred_denton_proxy/run_summary.json
    out_md: data/processed/fred_denton_proxy/run_summary.md

  - id: method_status
    action: write-method-status
    out: data/processed/temporal_disaggregation_method_status.csv

  - id: build_weekly_state
    action: build-weekly-state
    raw: data/raw/fred_hf_sources.csv
    out: data/processed/tdc_weekly_state.csv

  - id: download_outcome_fred
    action: download-outcome-fred
    out: data/raw/fred_outcome_sources.csv

  - id: build_outcomes
    action: build-outcomes
    raw: data/raw/fred_outcome_sources.csv
    out: data/processed/fred_monthly_outcomes.csv
    metadata: data/processed/fred_monthly_outcome_metadata.csv

  - id: build_weekly_outcomes
    action: build-weekly-state
    raw: data/raw/fred_outcome_sources.csv
    out: data/processed/fred_weekly_outcomes.csv

  - id: build_weekly_channel_panel
    action: build-weekly-channel-panel
    inputs:
      - data/processed/tdc_weekly_state.csv
      - data/processed/fred_weekly_outcomes.csv
    out: data/processed/tdc_weekly_channel_panel.csv

  - id: weekly_tga_channel_lp
    action: run-lp
    data: data/processed/tdc_weekly_channel_panel.csv
    shock: d_tga_wednesday
    outcomes:
      - d_onrrp
      - d_reserves
      - d_bank_treasury_agency
      - d_domestic_non_large_time_deposits
      - d_broad_deposits
      - d_retail_mmf
      - d_institutional_mmf
      - d_total_mmf
    controls:
      - lag_d_tga_wednesday
      - lag_d_onrrp
      - lag_d_reserves
      - yield_2y
      - yield_10y
    horizons: [0, 1, 2, 4, 8, 12]
    out: data/processed/weekly_tga_channel_lp.csv

  - id: weekly_fed_holdings_channel_lp
    action: run-lp
    data: data/processed/tdc_weekly_channel_panel.csv
    shock: d_fed_treasury_holdings
    outcomes:
      - d_onrrp
      - d_reserves
      - d_bank_treasury_agency
      - d_domestic_non_large_time_deposits
      - d_broad_deposits
      - d_retail_mmf
      - d_institutional_mmf
      - d_total_mmf
    controls:
      - lag_d_fed_treasury_holdings
      - lag_d_onrrp
      - lag_d_reserves
      - yield_2y
      - yield_10y
    horizons: [0, 1, 2, 4, 8, 12]
    out: data/processed/weekly_fed_holdings_channel_lp.csv

  - id: assemble_complete_panel
    action: assemble-panel
    inputs:
      - data/processed/fred_denton_proxy/tdc_monthly_proxy.csv
      - data/processed/fred_monthly_outcomes.csv
    lags:
      - deposits
      - bank_credit
    require:
      - tdc_monthly
      - deposits
      - lag_deposits
      - lag_bank_credit
      - yield_2y
      - yield_10y
    out: data/processed/fred_denton_model_panel_complete.csv

  - id: summarize_complete_panel
    action: summarize-panel
    data: data/processed/fred_denton_model_panel_complete.csv
    out: data/processed/fred_denton_model_panel_summary.csv

  - id: residual_tdc_shock
    action: build-residual-shock
    data: data/processed/fred_denton_model_panel_complete.csv
    target: tdc_monthly
    predictors:
      - lag_deposits
      - lag_bank_credit
      - yield_2y
      - yield_10y
    min_train_obs: 36
    out: data/processed/fred_denton_complete_residual_shock.csv

  - id: reduced_form_lp
    action: run-lp
    data: data/processed/fred_denton_complete_residual_shock.csv
    shock: tdc_monthly_residual_z
    outcomes:
      - deposits
      - large_time_deposits
      - domestic_non_large_time_deposits
      - broad_deposits
      - bank_credit
      - reserves
      - onrrp
      - retail_mmf
      - institutional_mmf
      - total_mmf
      - commercial_industrial_loans
      - consumer_loans
      - credit_card_revolving_loans
      - closed_end_residential_loans
      - cre_multifamily_loans
      - cre_nonfarm_nonresidential_loans
      - loans_to_nondepository_financial_institutions
      - d_baa_aaa_spread
      - d_investment_grade_oas
      - d_high_yield_oas
      - commercial_industrial_loans
      - consumer_loans
      - credit_card_revolving_loans
      - auto_loans
      - other_consumer_loans
      - closed_end_residential_loans
      - heloc_loans
      - construction_land_development_loans
      - cre_multifamily_loans
      - cre_nonfarm_nonresidential_loans
      - loans_to_nondepository_financial_institutions
      - d_baa_aaa_spread
      - d_investment_grade_oas
      - d_high_yield_oas
      - d_term_spread_10y_2y
      - d_term_spread_10y_3m
      - d_effr_iorb_spread
      - d_sofr_iorb_spread
    controls:
      - lag_deposits
      - lag_bank_credit
      - yield_2y
      - yield_10y
    horizons: [0, 1, 2, 3, 4, 6, 12]
    out: data/processed/fred_denton_complete_reduced_form_lp.csv

  - id: tga_rebuild_shock
    action: build-tga-rebuild-shock
    data: data/processed/fred_dts_monthly_indicators.csv
    target: minus_toc
    predictors:
      - fed_tsy
      - banks_tsy
      - fed_remit_positive
    min_train_obs: 36
    out: data/processed/tga_rebuild_shock.csv

  - id: long_tga_rebuild_shock
    action: build-named-residual-shock
    data: data/processed/fred_dts_monthly_indicators.csv
    target: minus_toc
    predictors:
      - fed_tsy
      - fed_remit_positive
    residual_column: tga_long_surprise
    fitted_column: tga_long_expected
    z_column: tga_long_surprise_z
    min_train_obs: 36
    month_dummies: true
    trend: true
    out: data/processed/long_tga_rebuild_shock.csv

  - id: fiscal_flow_shock
    action: build-named-residual-shock
    data: data/processed/fred_dts_monthly_indicators.csv
    target: net_tga_withdrawals
    predictors:
      - fed_tsy
      - banks_tsy
      - fed_remit_positive
    residual_column: fiscal_flow_surprise
    fitted_column: fiscal_flow_expected
    z_column: fiscal_flow_surprise_z
    min_train_obs: 12
    month_dummies: true
    trend: true
    out: data/processed/fiscal_flow_shock.csv

  - id: tax_deposit_shock
    action: build-named-residual-shock
    data: data/processed/fred_dts_monthly_indicators.csv
    target: dts_tax_deposits
    predictors:
      - fed_tsy
      - banks_tsy
      - fed_remit_positive
    residual_column: tax_deposit_surprise
    fitted_column: tax_deposit_expected
    z_column: tax_deposit_surprise_z
    min_train_obs: 36
    month_dummies: true
    trend: true
    out: data/processed/tax_deposit_shock.csv

  - id: core_payment_shock
    action: build-named-residual-shock
    data: data/processed/fred_dts_monthly_indicators.csv
    target: dts_core_payment_withdrawals
    predictors:
      - fed_tsy
      - banks_tsy
      - fed_remit_positive
    residual_column: core_payment_surprise
    fitted_column: core_payment_expected
    z_column: core_payment_surprise_z
    min_train_obs: 36
    month_dummies: true
    trend: true
    out: data/processed/core_payment_shock.csv

  - id: auction_size_shock
    action: build-auction-size-shock
    raw: ../qrawatch/data/raw/fiscaldata/auctions_query.csv
    out: data/processed/auction_size_shock.csv
    date_column: issue_date
    amount_column: offering_amt
    tenor_column: security_term
    min_train_obs: 12

  - id: shock_bundle
    action: build-shock-bundle
    inputs:
      - data/processed/fred_denton_complete_residual_shock.csv
      - data/processed/tga_rebuild_shock.csv
      - data/processed/long_tga_rebuild_shock.csv
      - data/processed/fiscal_flow_shock.csv
      - data/processed/tax_deposit_shock.csv
      - data/processed/core_payment_shock.csv
      - data/processed/auction_size_shock.csv
    columns:
      - tdc_monthly_residual
      - tdc_monthly_residual_z
      - tga_rebuild_surprise
      - tga_rebuild_surprise_z
      - tga_long_surprise
      - tga_long_surprise_z
      - fiscal_flow_surprise
      - fiscal_flow_surprise_z
      - tax_deposit_surprise
      - tax_deposit_surprise_z
      - core_payment_surprise
      - core_payment_surprise_z
      - auction_size_surprise
      - auction_size_surprise_z
      - auction_bill_surprise
      - auction_bill_surprise_z
      - auction_note_surprise
      - auction_note_surprise_z
      - auction_bond_surprise
      - auction_bond_surprise_z
      - auction_coupon_surprise
      - auction_coupon_surprise_z
    out: data/processed/fred_denton_shock_bundle.csv

  - id: assemble_shock_panel
    action: assemble-panel
    inputs:
      - data/processed/fred_denton_model_panel_complete.csv
      - data/processed/fred_denton_shock_bundle.csv
    require:
      - tdc_monthly
      - deposits
      - tga_rebuild_surprise_z
      - auction_size_surprise_z
    out: data/processed/fred_denton_model_panel_with_shocks.csv

  - id: summarize_shock_panel
    action: summarize-panel
    data: data/processed/fred_denton_model_panel_with_shocks.csv
    out: data/processed/fred_denton_model_panel_with_shocks_summary.csv

  - id: assemble_long_tga_panel
    action: assemble-panel
    inputs:
      - data/processed/fred_denton_model_panel_complete.csv
      - data/processed/fred_denton_shock_bundle.csv
    require:
      - tdc_monthly
      - deposits
      - tga_long_surprise_z
    out: data/processed/fred_denton_model_panel_with_long_tga_shock.csv

  - id: summarize_long_tga_panel
    action: summarize-panel
    data: data/processed/fred_denton_model_panel_with_long_tga_shock.csv
    out: data/processed/fred_denton_model_panel_with_long_tga_shock_summary.csv

  - id: assemble_fiscal_flow_shock_panel
    action: assemble-panel
    inputs:
      - data/processed/fred_denton_model_panel_with_shocks.csv
    require:
      - tdc_monthly
      - deposits
      - tga_rebuild_surprise_z
      - fiscal_flow_surprise_z
      - auction_size_surprise_z
    out: data/processed/fred_denton_model_panel_with_fiscal_flow_shocks.csv

  - id: summarize_fiscal_flow_shock_panel
    action: summarize-panel
    data: data/processed/fred_denton_model_panel_with_fiscal_flow_shocks.csv
    out: data/processed/fred_denton_model_panel_with_fiscal_flow_shocks_summary.csv

  - id: assemble_category_flow_shock_panel
    action: assemble-panel
    inputs:
      - data/processed/fred_denton_model_panel_with_shocks.csv
    require:
      - tdc_monthly
      - deposits
      - tga_rebuild_surprise_z
      - tax_deposit_surprise_z
      - core_payment_surprise_z
      - auction_size_surprise_z
    out: data/processed/fred_denton_model_panel_with_category_flow_shocks.csv

  - id: summarize_category_flow_shock_panel
    action: summarize-panel
    data: data/processed/fred_denton_model_panel_with_category_flow_shocks.csv
    out: data/processed/fred_denton_model_panel_with_category_flow_shocks_summary.csv

  - id: add_calendar_controls
    action: add-calendar-controls
    data: data/processed/fred_denton_model_panel_with_shocks.csv
    out: data/processed/fred_denton_model_panel_with_calendar_controls.csv

  - id: add_pretrend_controls
    action: add-pretrend-controls
    data: data/processed/fred_denton_model_panel_with_shocks.csv
    columns:
      - deposits
      - bank_credit
    lags: [2, 3]
    windows: [3, 6]
    out: data/processed/fred_denton_model_panel_with_pretrend_controls.csv

  - id: add_long_tga_pretrend_controls
    action: add-pretrend-controls
    data: data/processed/fred_denton_model_panel_with_long_tga_shock.csv
    columns:
      - deposits
      - bank_credit
    lags: [2, 3]
    windows: [3, 6]
    out: data/processed/fred_denton_long_tga_panel_with_pretrend_controls.csv

  - id: add_long_tga_calendar_controls
    action: add-calendar-controls
    data: data/processed/fred_denton_long_tga_panel_with_pretrend_controls.csv
    out: data/processed/fred_denton_long_tga_panel_with_calendar_controls.csv

  - id: add_long_tga_factor_controls
    action: add-factor-controls
    data: data/processed/fred_denton_long_tga_panel_with_pretrend_controls.csv
    columns:
      - deposits
      - broad_deposits
      - large_time_deposits
      - bank_credit
      - reserves
      - retail_mmf
      - yield_2y
      - yield_10y
    n_factors: 3
    lag: 1
    out: data/processed/fred_denton_long_tga_panel_with_factor_controls.csv

  - id: add_category_pretrend_controls
    action: add-pretrend-controls
    data: data/processed/fred_denton_model_panel_with_category_flow_shocks.csv
    columns:
      - deposits
      - bank_credit
    lags: [2, 3]
    windows: [3, 6]
    out: data/processed/fred_denton_category_panel_with_pretrend_controls.csv

  - id: shock_first_stage
    action: first-stage
    data: data/processed/fred_denton_model_panel_with_shocks.csv
    treatment: tdc_monthly
    instruments:
      - tga_rebuild_surprise_z
      - auction_size_surprise_z
    controls:
      - lag_deposits
      - lag_bank_credit
      - yield_2y
      - yield_10y
    out: data/processed/fred_denton_shock_first_stage.csv

  - id: fiscal_flow_first_stage
    action: first-stage
    data: data/processed/fred_denton_model_panel_with_fiscal_flow_shocks.csv
    treatment: tdc_monthly
    instruments:
      - tga_rebuild_surprise_z
      - fiscal_flow_surprise_z
      - auction_size_surprise_z
    controls:
      - lag_deposits
      - lag_bank_credit
      - yield_2y
      - yield_10y
    out: data/processed/fred_denton_fiscal_flow_first_stage.csv

  - id: category_flow_first_stage
    action: first-stage
    data: data/processed/fred_denton_model_panel_with_category_flow_shocks.csv
    treatment: tdc_monthly
    instruments:
      - tga_rebuild_surprise_z
      - tax_deposit_surprise_z
      - core_payment_surprise_z
      - auction_size_surprise_z
    controls:
      - lag_deposits
      - lag_bank_credit
      - yield_2y
      - yield_10y
    out: data/processed/fred_denton_category_flow_first_stage.csv

  - id: pretrend_first_stage
    action: first-stage
    data: data/processed/fred_denton_model_panel_with_pretrend_controls.csv
    treatment: tdc_monthly
    instruments:
      - tga_rebuild_surprise_z
      - auction_size_surprise_z
    controls:
      - lag_deposits
      - lag_bank_credit
      - yield_2y
      - yield_10y
      - lag2_deposits
      - lag3_deposits
      - pretrend3_deposits
      - pretrend6_deposits
      - lag2_bank_credit
      - lag3_bank_credit
      - pretrend3_bank_credit
      - pretrend6_bank_credit
    out: data/processed/fred_denton_pretrend_first_stage.csv

  - id: headline_tga_pretrend_first_stage
    action: first-stage
    data: data/processed/fred_denton_model_panel_with_pretrend_controls.csv
    treatment: tdc_monthly
    instruments:
      - tga_rebuild_surprise_z
    controls:
      - lag_deposits
      - lag_bank_credit
      - yield_2y
      - yield_10y
      - lag2_deposits
      - lag3_deposits
      - pretrend3_deposits
      - pretrend6_deposits
      - lag2_bank_credit
      - lag3_bank_credit
      - pretrend3_bank_credit
      - pretrend6_bank_credit
    out: data/processed/fred_denton_headline_tga_pretrend_first_stage.csv

  - id: long_tga_pretrend_first_stage
    action: first-stage
    data: data/processed/fred_denton_long_tga_panel_with_pretrend_controls.csv
    treatment: tdc_monthly
    instruments:
      - tga_long_surprise_z
    controls:
      - lag_deposits
      - lag_bank_credit
      - yield_2y
      - yield_10y
      - lag2_deposits
      - lag3_deposits
      - pretrend3_deposits
      - pretrend6_deposits
      - lag2_bank_credit
      - lag3_bank_credit
      - pretrend3_bank_credit
      - pretrend6_bank_credit
    out: data/processed/fred_denton_long_tga_pretrend_first_stage.csv

  - id: long_tga_factor_first_stage
    action: first-stage
    data: data/processed/fred_denton_long_tga_panel_with_factor_controls.csv
    treatment: tdc_monthly
    instruments:
      - tga_long_surprise_z
    controls:
      - lag_deposits
      - lag_bank_credit
      - yield_2y
      - yield_10y
      - lag2_deposits
      - lag3_deposits
      - pretrend3_deposits
      - pretrend6_deposits
      - lag2_bank_credit
      - lag3_bank_credit
      - pretrend3_bank_credit
      - pretrend6_bank_credit
      - factor1_lag1
      - factor2_lag1
      - factor3_lag1
    out: data/processed/fred_denton_long_tga_factor_first_stage.csv

  - id: shock_lp_iv
    action: run-lp-iv
    data: data/processed/fred_denton_model_panel_with_shocks.csv
    treatment: tdc_monthly
    instruments:
      - tga_rebuild_surprise_z
      - auction_size_surprise_z
    outcomes:
      - deposits
      - large_time_deposits
      - domestic_non_large_time_deposits
      - broad_deposits
      - bank_credit
      - reserves
      - onrrp
      - retail_mmf
      - institutional_mmf
      - total_mmf
      - commercial_industrial_loans
      - consumer_loans
      - credit_card_revolving_loans
      - closed_end_residential_loans
      - cre_multifamily_loans
      - cre_nonfarm_nonresidential_loans
      - loans_to_nondepository_financial_institutions
      - d_baa_aaa_spread
      - d_investment_grade_oas
      - d_high_yield_oas
      - commercial_industrial_loans
      - consumer_loans
      - credit_card_revolving_loans
      - auto_loans
      - other_consumer_loans
      - closed_end_residential_loans
      - heloc_loans
      - construction_land_development_loans
      - cre_multifamily_loans
      - cre_nonfarm_nonresidential_loans
      - loans_to_nondepository_financial_institutions
      - d_baa_aaa_spread
      - d_investment_grade_oas
      - d_high_yield_oas
      - d_term_spread_10y_2y
      - d_term_spread_10y_3m
      - d_effr_iorb_spread
      - d_sofr_iorb_spread
    controls:
      - lag_deposits
      - lag_bank_credit
      - yield_2y
      - yield_10y
    horizons: [0, 1, 2, 3, 4, 6, 12]
    out: data/processed/fred_denton_shock_lp_iv.csv

  - id: headline_tga_pretrend_lp_iv
    action: run-lp-iv
    data: data/processed/fred_denton_model_panel_with_pretrend_controls.csv
    treatment: tdc_monthly
    instruments:
      - tga_rebuild_surprise_z
    outcomes:
      - deposits
      - large_time_deposits
      - domestic_non_large_time_deposits
      - broad_deposits
      - bank_credit
      - reserves
      - onrrp
      - retail_mmf
      - institutional_mmf
      - total_mmf
      - commercial_industrial_loans
      - consumer_loans
      - credit_card_revolving_loans
      - auto_loans
      - other_consumer_loans
      - closed_end_residential_loans
      - heloc_loans
      - construction_land_development_loans
      - cre_multifamily_loans
      - cre_nonfarm_nonresidential_loans
      - loans_to_nondepository_financial_institutions
      - d_baa_aaa_spread
      - d_investment_grade_oas
      - d_high_yield_oas
      - d_term_spread_10y_2y
      - d_term_spread_10y_3m
      - d_effr_iorb_spread
      - d_sofr_iorb_spread
    controls:
      - lag_deposits
      - lag_bank_credit
      - yield_2y
      - yield_10y
      - lag2_deposits
      - lag3_deposits
      - pretrend3_deposits
      - pretrend6_deposits
      - lag2_bank_credit
      - lag3_bank_credit
      - pretrend3_bank_credit
      - pretrend6_bank_credit
    horizons: [0, 1, 2, 3, 4, 6, 12]
    out: data/processed/fred_denton_headline_tga_pretrend_lp_iv.csv

  - id: long_tga_pretrend_lp_iv
    action: run-lp-iv
    data: data/processed/fred_denton_long_tga_panel_with_pretrend_controls.csv
    treatment: tdc_monthly
